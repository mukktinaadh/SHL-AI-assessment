name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Create dummy backend/.env
        run: |
          echo "GEMINI_API_KEY=dummy" > backend/.env
          echo "GROQ_API_KEY=dummy" >> backend/.env

      - name: Create dummy backend/data/catalog.json
        run: |
          mkdir -p backend/data
          cat << 'EOF' > backend/data/catalog.json
          [
            {"name": "Fake Test 1", "url": "https://www.shl.com/products/product-catalog/view/fake-test-1/", "test_type": "K"},
            {"name": "Fake Test 2", "url": "https://www.shl.com/products/product-catalog/view/fake-test-2/", "test_type": "P"}
          ]
          EOF

      - name: Run pytest
        run: |
          cd backend
          pytest tests/test_api.py -v --tb=short
